version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: deaddrop-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: deaddrop
      MYSQL_USER: deaddrop
      MYSQL_PASSWORD: deaddroppass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 5

  api:
    build: .
    container_name: deaddrop-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mysql_data:
